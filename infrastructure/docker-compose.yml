version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - smatc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smatc-network
    environment:
      - VITE_API_URL=http://backend:8000/api/v1

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - smatc-network
    environment:
      - DATABASE_URL=postgresql://smatc:smatc123@postgres:5432/smatc
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=videos
    volumes:
      - ./backend:/app
      - models-cache:/models

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis
    networks:
      - smatc-network
    environment:
      - DATABASE_URL=postgresql://smatc:smatc123@postgres:5432/smatc
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./backend:/app
      - models-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=smatc
      - POSTGRES_PASSWORD=smatc123
      - POSTGRES_DB=smatc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smatc-network

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - smatc-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - smatc-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  models-cache:

networks:
  smatc-network:
    driver: bridge